<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="forgekit: the cognitive substrate — memory, foresight, and guardrails — wraps a stateless model and is delivered as one config to nine AI coding tools.">
  <defs>
    <radialGradient id="glowL" cx="30%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#f26430" stop-opacity="0.10"/>
      <stop offset="70%" stop-color="#f26430" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emberL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f26430"/>
      <stop offset="100%" stop-color="#d94e1f"/>
    </linearGradient>
  </defs>

  <rect width="960" height="420" rx="20" fill="#faf7f3"/>
  <rect width="960" height="420" rx="20" fill="url(#glowL)"/>
  <rect x="0.75" y="0.75" width="958.5" height="418.5" rx="19" fill="none" stroke="#e0d6c8" stroke-width="1.5"/>

  <!-- wordmark -->
  <g transform="translate(40,40)">
    <path d="M12 0 14.2 7.2 21.5 7.5 15.7 11.9 18 19 12 14.6 6 19 8.3 11.9 2.5 7.5 9.8 7.2Z" fill="#f26430"/>
    <text x="34" y="15" font-size="19" font-weight="700" fill="#171310">forge<tspan fill="#d94e1f">kit</tspan></text>
  </g>
  <text x="40" y="92" font-size="13" letter-spacing="0.14em" fill="#d94e1f" font-weight="600">ONE BRAIN FOR EVERY AI CODING AGENT</text>

  <!-- LEFT: the stateless model -->
  <g transform="translate(60,150)">
    <rect x="0" y="0" width="196" height="150" rx="14" fill="#ffffff" stroke="#e0d6c8" stroke-width="1.5"/>
    <text x="98" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#171310">stateless model</text>
    <text x="98" y="56" text-anchor="middle" font-size="11.5" fill="#6b6155">one context window</text>
    <text x="98" y="72" text-anchor="middle" font-size="11.5" fill="#6b6155">wiped every call</text>
    <g stroke="#9a8f80" stroke-width="1.5" fill="none" opacity="0.8">
      <path d="M52 96 a20 20 0 1 1 -8 12"/>
      <path d="M44 108 l-1 12 l11 -5 Z" fill="#9a8f80" stroke="none"/>
    </g>
    <text x="112" y="112" font-size="11" fill="#9a8f80">no memory</text>
    <text x="112" y="128" font-size="11" fill="#9a8f80">no foresight</text>
  </g>

  <!-- MIDDLE: the substrate ring -->
  <g transform="translate(360,150)">
    <rect x="0" y="-6" width="232" height="168" rx="16" fill="#ffffff" stroke="#f26430" stroke-width="1.5"/>
    <text x="116" y="18" text-anchor="middle" font-size="13" font-weight="700" fill="#d94e1f">the cognitive substrate</text>
    <g transform="translate(16,34)">
      <rect x="0" y="0" width="200" height="34" rx="9" fill="#f7f2ec" stroke="#e0d6c8" stroke-width="1"/>
      <circle cx="20" cy="17" r="5" fill="#f26430"/>
      <text x="36" y="16" font-size="12.5" font-weight="600" fill="#171310">memory</text>
      <text x="36" y="29" font-size="10.5" fill="#6b6155">proof-carrying, team-shared</text>
    </g>
    <g transform="translate(16,74)">
      <rect x="0" y="0" width="200" height="34" rx="9" fill="#f7f2ec" stroke="#e0d6c8" stroke-width="1"/>
      <circle cx="20" cy="17" r="5" fill="#f26430"/>
      <text x="36" y="16" font-size="12.5" font-weight="600" fill="#171310">foresight</text>
      <text x="36" y="29" font-size="10.5" fill="#6b6155">predicts an edit's blast radius</text>
    </g>
    <g transform="translate(16,114)">
      <rect x="0" y="0" width="200" height="34" rx="9" fill="#f7f2ec" stroke="#e0d6c8" stroke-width="1"/>
      <circle cx="20" cy="17" r="5" fill="#f26430"/>
      <text x="36" y="16" font-size="12.5" font-weight="600" fill="#171310">guardrails</text>
      <text x="36" y="29" font-size="10.5" fill="#6b6155">enforced hooks, not prose</text>
    </g>
  </g>

  <!-- arrow: model -> substrate -->
  <g stroke="#f26430" stroke-width="2" fill="none">
    <path d="M256 225 L352 225"/>
    <path d="M352 225 l-11 -5 l0 10 Z" fill="#f26430" stroke="none"/>
  </g>

  <!-- RIGHT: one config -> nine tools -->
  <g transform="translate(700,150)">
    <rect x="0" y="-6" width="200" height="168" rx="16" fill="#ffffff" stroke="#e0d6c8" stroke-width="1.5"/>
    <rect x="16" y="16" width="168" height="32" rx="9" fill="url(#emberL)"/>
    <text x="100" y="37" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">one config</text>
    <g font-size="10.5" fill="#171310">
      <text x="20" y="72">Claude Code</text><text x="112" y="72">Codex</text>
      <text x="20" y="92">Cursor</text><text x="112" y="92">Gemini</text>
      <text x="20" y="112">Aider</text><text x="112" y="112">Copilot</text>
      <text x="20" y="132">Windsurf</text><text x="112" y="132">Zed</text>
      <text x="20" y="152">Continue</text><text x="112" y="152" fill="#6b6155">+ MCP</text>
    </g>
  </g>

  <!-- arrow: substrate -> config -->
  <g stroke="#f26430" stroke-width="2" fill="none">
    <path d="M592 225 L692 225"/>
    <path d="M692 225 l-11 -5 l0 10 Z" fill="#f26430" stroke="none"/>
  </g>

  <!-- footer strip -->
  <text x="480" y="356" text-anchor="middle" font-size="12" fill="#6b6155">every task passes a fast gate · every verified outcome flows back into the shared memory</text>
  <text x="480" y="388" text-anchor="middle" font-size="11.5" fill="#9a8f80">author once · zero runtime dependencies · plain-git team memory</text>
</svg>
