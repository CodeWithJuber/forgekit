name: Bug report
description: Report a problem with forgekit
labels: [bug, needs reproduction]
body:
  - type: markdown
    attributes:
      value: "Thanks for the report. Please run `forge doctor` and search existing issues/discussions first."
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: forge-version
    attributes:
      label: forgekit version (`forge --version`)
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version (`node --version`)
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`forge doctor` output"
      render: text
